name: Stadium showcase drip

# Pre-tournament campaign: 16 venues, one post every 8h, starting
# 2026-06-04 22:00 UTC, finishing ~37h before the opening match.
# The script picks the next stadium deterministically from the elapsed time
# since the campaign start, so a missed/delayed fire just skips a slot.
on:
  # Schedule disabled: the 16-venue stadium campaign is finished. Kept as a
  # manual trigger so a venue can still be re-fired by hand if needed.
  workflow_dispatch:
    inputs:
      venue:
        description: "Override: explicit venue name (e.g. \"MetLife Stadium\"). Empty = auto-pick by slot."
        required: false
        type: string

jobs:
  stadium:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # preview-only, no approval poll

    env:
      DATA_MODE: live
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run stadium bot
        run: |
          if [ -n "${{ inputs.venue }}" ]; then
            python main.py --stadium "${{ inputs.venue }}" --preview
          else
            python main.py --stadium-cron --preview
          fi

      - name: Upload generated slides as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stadium-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
