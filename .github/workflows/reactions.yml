name: Match reactions

# Live post-match reactions: polls every 30 min during plausible WC match
# hours (kickoffs run ~16:00-04:00 UTC, settle ~2h later) and reacts to any
# match that just finished. One reaction post per match, sent to Telegram for
# the user to post on TikTok. Stateless window picker; FINISHED check + manual
# posting absorb the rare boundary double-send.
on:
  schedule:
    # every 30 min from 17:00 to 06:30 UTC, offset to :07/:37 (off peak hour).
    - cron: "7,37 17-23 * * *"
    - cron: "7,37 0-6 * * *"
  workflow_dispatch:
    inputs:
      match_id:
        description: "Override: react to one specific finished fixture id."
        required: false
        type: string

jobs:
  reactions:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATA_MODE: live
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run reaction poller
        run: |
          if [ -n "${{ inputs.match_id }}" ]; then
            python main.py --reaction "${{ inputs.match_id }}"
          else
            python main.py --reactions
          fi

      - name: Upload generated slides as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reactions-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
