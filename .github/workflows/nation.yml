name: Nation showcase drip

# Pre-tournament campaign: 48 nations, one post every 6h (4/day), starting
# 2026-06-06 00:00 UTC, finishing ~18 Jun (around the end of matchday 1).
# The script picks the next nation deterministically from elapsed time since
# the campaign start, so a missed/delayed fire just skips a slot.
on:
  schedule:
    # 2 fires/day at 06/18 UTC, offset to :37 — cut down from 4/day after
    # TikTok throttle analysis (over-posting was killing reach). Campaign
    # spreads to ~30 Jun instead of ~18 Jun; remaining nations still drop
    # before / during the early matchdays. The deterministic slot picker
    # works on elapsed time, so spacing slots just dilates the campaign.
    - cron: "37 6 * * *"
    - cron: "37 18 * * *"
  workflow_dispatch:
    inputs:
      tla:
        description: "Override: explicit nation TLA (e.g. \"FRA\"). Empty = auto-pick by slot."
        required: false
        type: string

jobs:
  nation:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # preview-only, no approval poll

    env:
      DATA_MODE: live
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run nation bot
        run: |
          if [ -n "${{ inputs.tla }}" ]; then
            python main.py --nation "${{ inputs.tla }}" --preview
          else
            python main.py --nation-cron --preview
          fi

      - name: Upload generated slides as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nation-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
