name: Nation showcase drip

# Showcase campaign: 48 nations, ~2 posts/day. Each fire sends the NEXT nation
# not yet sent (state in data/nation_campaign.json, committed back after each
# run), so a skipped or delayed cron run only delays the campaign — it never
# drops a nation. Manual override below re-fires a specific TLA.
on:
  schedule:
    # 2 fires/day at 06:37 / 18:37 UTC. With the stateful picker the exact
    # timing no longer matters: each fire just advances the campaign by one.
    - cron: "37 6 * * *"
    - cron: "37 18 * * *"
  workflow_dispatch:
    inputs:
      tla:
        description: "Override: explicit nation TLA (e.g. \"FRA\"). Empty = auto-pick by slot."
        required: false
        type: string

jobs:
  nation:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push the advanced campaign state back to main
    timeout-minutes: 30  # send-only, no approval poll

    env:
      DATA_MODE: live
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run nation bot
        run: |
          if [ -n "${{ inputs.tla }}" ]; then
            python main.py --nation "${{ inputs.tla }}" --preview
          else
            python main.py --nation-cron --preview
          fi

      - name: Commit campaign state
        if: success()
        run: |
          if git diff --quiet -- data/nation_campaign.json; then
            echo "[state] no change to commit"
            exit 0
          fi
          git config user.name "worldcup-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nation_campaign.json
          git commit -m "chore(nation): advance campaign state [skip ci]"
          git push origin HEAD:main

      - name: Upload generated slides as artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nation-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
