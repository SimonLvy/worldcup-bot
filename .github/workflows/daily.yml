name: Daily WC matchday bot

# Runs every morning at 06:00 UTC (= 08:00 in France during the tournament,
# CEST = UTC+2). Adjust the cron if you want a different time.
#
# Also runnable on-demand from the Actions tab via "Run workflow".
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional: YYYY-MM-DD to fetch matches for that date (default = tomorrow)"
        required: false
        type: string

jobs:
  matchday:
    runs-on: ubuntu-latest
    timeout-minutes: 270  # approval poll up to 240 min + setup buffer

    env:
      DATA_MODE: live
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run matchday bot
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            python main.py --date "${{ inputs.target_date }}"
          else
            python main.py --tomorrow
          fi

      - name: Upload generated slides as artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
