name: Daily WC matchday bot

# Runs every morning at 06:00 UTC (= 08:00 in France during the tournament,
# CEST = UTC+2). Adjust the cron if you want a different time.
#
# Also runnable on-demand from the Actions tab via "Run workflow".
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  matchday:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # one approval can sit for up to 60 min

    env:
      DATA_MODE: live
      FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run matchday bot for tomorrow's fixtures
        run: python main.py --tomorrow

      - name: Upload generated slides as artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slides-${{ github.run_number }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
