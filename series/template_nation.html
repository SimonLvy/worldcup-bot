<!-- bootstrap: nation reads window.__post (Python injects it, like __match on the
     match template). Alias it to __match so the shared engine renders it as `m`.
     ?nation=FRA in the URL picks one of the inline preview payloads below so the
     designer can flip through representative palettes (FRA blue, BRA yellow/green,
     ARG light blue, MAR red/green, USA navy/red, ISL first-WC fallback). -->
<script>
  window.WC_CONFIG = { slides: ['n1', 'n2', 'n3'] };

  /* ------------------------------------------------------------------
     Per-nation background gradient — generated INLINE from colors.primary
     so every nation's carousel echoes its own palette.

     The shared engine (render.js) calls WCF.themeFor(m) to derive --bg.
     We wrap it so post_type === 'nation' takes the JS-derived gradient,
     and every other post_type keeps the original dark-jewel themeFor().
  ------------------------------------------------------------------ */
  (function () {
    if (!window.WCF || !window.WCF.themeFor) return;
    const baseThemeFor = window.WCF.themeFor;

    // hex (#RRGGBB) -> {h,s,l} (h:0..360, s/l:0..1)
    function hexToHsl(hex) {
      const m = (hex || '').replace('#', '').match(/^([0-9a-f]{6})$/i);
      if (!m) return { h: 220, s: 0.5, l: 0.3 };
      const r = parseInt(m[1].slice(0, 2), 16) / 255;
      const g = parseInt(m[1].slice(2, 4), 16) / 255;
      const b = parseInt(m[1].slice(4, 6), 16) / 255;
      const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
      let h = 0, s = 0; const l = (mx + mn) / 2;
      if (mx !== mn) {
        const d = mx - mn;
        s = l > 0.5 ? d / (2 - mx - mn) : d / (mx + mn);
        if (mx === r) h = (g - b) / d + (g < b ? 6 : 0);
        else if (mx === g) h = (b - r) / d + 2;
        else h = (r - g) / d + 4;
        h *= 60;
      }
      return { h, s, l };
    }
    function hsl(c, lPct) {
      return `hsl(${c.h.toFixed(1)} ${(c.s * 100).toFixed(1)}% ${(lPct * 100).toFixed(1)}%)`;
    }

    window.WCF.themeFor = function (m) {
      if (!m || m.post_type !== 'nation') return baseThemeFor(m);
      const primary = (m.colors && m.colors.primary) || '#17345f';
      const accent  = (m.colors && (m.colors.accent || m.colors.secondary)) || '#e7b549';
      const c = hexToHsl(primary);

      // Bright primary nations (white, pale yellow) wash out on a 1080×1350
      // canvas with white text — clamp lightness so the gradient still reads
      // as a "dark" background and the WC2026 ghost-mark stays visible.
      const topL = Math.min(c.l, 0.42);
      const midL = Math.max(topL - 0.18, 0.06);
      const botL = Math.max(topL - 0.32, 0.04);

      // Accent gets a lightness floor too so dark accents (deep green, navy)
      // stay visible as text/numbers on the gradient.
      const ac = hexToHsl(accent);
      const accentL = Math.max(ac.l, 0.55);
      const accentSoft = `hsl(${ac.h.toFixed(1)} ${(ac.s * 100).toFixed(1)}% ${(Math.min(accentL + 0.12, 0.92) * 100).toFixed(1)}%)`;
      const accentHi   = `hsl(${ac.h.toFixed(1)} ${(ac.s * 100).toFixed(1)}% ${(accentL * 100).toFixed(1)}%)`;
      // Same hue at 20% alpha for accent-tinted backgrounds.
      const accentTint = `hsla(${ac.h.toFixed(1)}, ${(ac.s * 100).toFixed(1)}%, ${(accentL * 100).toFixed(1)}%, 0.16)`;

      const deck = document.getElementById('deck');
      if (deck) {
        deck.style.setProperty('--accent', accentHi);
        deck.style.setProperty('--accent-soft', accentSoft);
        deck.style.setProperty('--accent-tint', accentTint);
      }

      const top = hsl(c, topL);
      const mid = hsl(c, midL);
      const bot = hsl(c, botL);
      return `radial-gradient(125% 90% at 50% -10%, ${top} 0%, ${mid} 46%, ${bot} 100%)`;
    };
  })();
